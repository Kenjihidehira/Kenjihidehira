<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stroke" x1="40" y1="40" x2="1240" y2="320">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 80) rotate(150) scale(360 240)">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="30" fill="url(#glow)"/>
  <rect x="22" y="22" width="1236" height="316" rx="24" stroke="url(#stroke)" stroke-opacity="0.55" stroke-width="2"/>

  <text x="60" y="72" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">Sistema Visual do Portf&#243;lio</text>
  <text x="60" y="106" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Perfil GitHub pr&#225;tico, focado em projetos reais, progresso vis&#237;vel e evolu&#231;&#227;o t&#233;cnica.</text>

  <g transform="translate(60 145)">
    <rect width="360" height="150" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <circle cx="42" cy="42" r="18" fill="#22D3EE"/>
    <text x="72" y="50" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="900">Construir</text>
    <text x="32" y="92" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Dashboards, CRUDs, CRM, ERP,</text>
    <text x="32" y="120" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">helpdesk e apps de produtividade.</text>
  </g>

  <g transform="translate(460 145)">
    <rect width="360" height="150" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <circle cx="42" cy="42" r="18" fill="#8B5CF6"/>
    <text x="72" y="50" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="900">Organizar</text>
    <text x="32" y="92" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Reposit&#243;rios por objetivo, stack,</text>
    <text x="32" y="120" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">clareza e evolu&#231;&#227;o do projeto.</text>
  </g>

  <g transform="translate(860 145)">
    <rect width="360" height="150" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <circle cx="42" cy="42" r="18" fill="#F97316"/>
    <text x="72" y="50" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="900">Evoluir</text>
    <text x="32" y="92" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Pr&#243;ximos passos: banco de dados,</text>
    <text x="32" y="120" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">login, deploy, testes e docs.</text>
  </g>
</svg>
